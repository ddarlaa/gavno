name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # CI: сборка .NET
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore & Build
        run: |
          dotnet restore API/API.csproj
          dotnet build API/API.csproj --no-restore --configuration Release

  # CI: сборка образа и публикация на Docker Hub
  docker-build-push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/icebreaker-app:latest
            ${{ secrets.DOCKER_USERNAME }}/icebreaker-app:${{ github.sha }}

  # CD: деплой на self-hosted runner (Windows)
  deploy:
    needs: docker-build-push
    runs-on: self-hosted
    steps:
      - name: Pull and restart
        shell: cmd
        run: |
          cd /d "C:\Users\Svetlana\OneDrive\Desktop\IceBreakerApp"
          docker compose pull
          docker compose up -d
      - name: Verify (health + acceptance gate)
        shell: powershell
        run: |
          Start-Sleep -Seconds 20
          # Health check
          $resp = Invoke-WebRequest -Uri "http://localhost/health" -UseBasicParsing
          if ($resp.StatusCode -ne 200) { throw "Health returned $($resp.StatusCode)" }
          Write-Host "Health OK"
          # Acceptance gate
          $query = [uri]::EscapeDataString('rate(http_requests_received_total{status=~"5.."}[1m])')
          $url = "http://localhost:9090/api/v1/query?query=$query"
          $json = (Invoke-WebRequest -Uri $url -UseBasicParsing).Content | ConvertFrom-Json
          if (-not $json.data.result) { throw "Prometheus query returned no data" }
          $rate = 0.0
          if ($json.data.result.Count -gt 0) { $rate = [double]$json.data.result[0].value[1] }
          Write-Host "5xx error rate: $rate"
          if ($rate -gt 0.05) { throw "Error rate too high ($rate)" }
          Write-Host "Deployment verified"
      - name: Verify deployment
        run: |
          sleep 15
          curl -f http://localhost/health || exit 1
          ERROR_RATE=$(curl -s "http://localhost:9090/api/v1/query" \
            --data-urlencode 'query=rate(http_requests_received_total{status=~"5.."}[1m])' \
            | jq '.data.result[0].value[1] // "0"')
          if (( $(echo "$ERROR_RATE > 0.05" | bc -l) )); then
            echo "5xx error rate too high: $ERROR_RATE"
            exit 1
          fi