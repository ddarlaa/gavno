name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ---------- CI: сборка и тесты ----------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run unit tests
        run: dotnet test --no-restore --verbosity normal

  # ---------- CI: сборка и публикация Docker образа ----------
  docker-build-push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/icebreaker-app:latest
            ${{ secrets.DOCKER_USERNAME }}/icebreaker-app:${{ github.sha }}

      - name: Notify (image published)
        run: |
          echo "Docker image published: ${{ secrets.DOCKER_USERNAME }}/icebreaker-app:latest"
          echo "Also tagged as: ${{ secrets.DOCKER_USERNAME }}/icebreaker-app:${{ github.sha }}"

  # ---------- CD: деплой через self-hosted runner ----------
  deploy:
    needs: docker-build-push
    runs-on: self-hosted
    steps:
      - name: Pull and restart containers
        run: |
          # ⚠️ ИЗМЕНИТЕ ПУТЬ на актуальный для вашего компьютера
          cd C:\Users\Svetlana\OneDrive\Desktop\IceBreakerApp
          docker compose pull web
          docker compose up -d --force-recreate web

      - name: Verify deployment (health + acceptance gate)
        run: |
          # Ждём, пока сервер запустится
          sleep 15

          # 1. Проверка health endpoint
          curl -f http://localhost/health || exit 1

          # 2. Запрос к Prometheus: ошибки 5xx за последнюю минуту
          ERROR_RATE=$(curl -s "http://localhost:9090/api/v1/query" \
            --data-urlencode 'query=rate(http_requests_received_total{status=~"5.."}[1m])' \
            | jq '.data.result[0].value[1] // "0"')

          echo "Current 5xx error rate: $ERROR_RATE"

          # 3. Если ошибок больше 5% — блокируем деплой
          if (( $(echo "$ERROR_RATE > 0.05" | bc -l) )); then
            echo "❌ Deployment rejected: error rate > 0.05 (5%)"
            exit 1
          fi

          echo "✅ Deployment verified successfully (error rate <= 0.05)"