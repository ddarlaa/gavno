name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # ---------- CI: минимальная сборка без тестов ----------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore dependencies (API only)
        run: dotnet restore API/API.csproj
      - name: Build API (ignore warnings)
        run: dotnet build API/API.csproj --no-restore --configuration Release -p:TreatWarningsAsErrors=false

  # ---------- CI: сборка и публикация Docker образа ----------
  docker-build-push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/icebreaker-app:latest
            ${{ secrets.DOCKER_USERNAME }}/icebreaker-app:${{ github.sha }}

  # ---------- CD: деплой через self-hosted runner ----------
  deploy:
    needs: docker-build-push
    runs-on: self-hosted
    steps:
      - name: Pull and restart containers
        run: |
          cd C:\Users\Svetlana\OneDrive\Desktop\IceBreakerApp
          docker compose pull web
          docker compose up -d --force-recreate web
      - name: Verify deployment (health + acceptance gate)
        run: |
          sleep 15
          curl -f http://localhost/health || exit 1
          ERROR_RATE=$(curl -s "http://localhost:9090/api/v1/query" \
            --data-urlencode 'query=rate(http_requests_received_total{status=~"5.."}[1m])' \
            | jq '.data.result[0].value[1] // "0"')
          if (( $(echo "$ERROR_RATE > 0.05" | bc -l) )); then
            echo "Error rate too high, deployment failed"
            exit 1
          fi
          echo "Deployment verified"