server {
    listen 80;
    server_name localhost;

    # healthcheck без переадресации на HTTPS
    location /health {
        proxy_pass http://web:80/api/health;
        proxy_set_header Host $host;
    }

    # всё остальное можно отправить на защищённый порт (если хочешь)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # отключаем проверку сертификата для бэкенда (если самоподписанный)
    location /health {
        proxy_pass http://web:80/api/health;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # статические файлы (если нужны)
    location /static/ {
        alias /usr/share/nginx/html/static/;
    }
} 